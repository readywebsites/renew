{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Renewone Solar</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon1.png' %}">
<link rel="shortcut icon" href="{% static 'img/favicon1.png' %}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/favicon1.png' %}">
<!-- Google Web Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Spinner Start -->
<div id="spinner" class="show bg-white position-fixed translate-middle w-150 vh-150 top-50 start-50 d-flex align-items-center justify-content-center">

<!-- Spinner End -->

<!-- Topbar Start -->
<div class="container-fluid bg-dark-green p-0">
    <div class="row gx-0 d-none d-lg-flex">
        <div class="col-lg-7 px-5 d-flex justify-content-center align-items-center text-center">
            <div class="h-100 d-inline-flex align-items-center me-2">
                <small class="text-white">
                    ☀️ Save Up To 90% On Electricity Bills With RenewOne Solar Solutions |
                </small>
            </div>

            <div class="h-100 d-inline-flex align-items-center">
                <small class="text-white">
                    Get Free Consultation Today
                </small>
            </div>
        </div>

        <div class="col-lg-5 px-5 text-end">
            <div class="h-100 d-inline-flex align-items-center me-4">
                <small class="fa fa-phone-alt text-primary me-2"></small>
                <small class="text-white">+91 9474450575</small>
            </div>

            <div class="h-100 d-inline-flex align-items-center mx-n2">
                <a class="btn btn-square btn-link rounded-0 border-0 border-end border-secondary text-white"
                   href="https://www.facebook.com/people/Renewone-Solutions-Pvt-Ltd/61590510455255/"
                   target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a class="btn btn-square btn-link rounded-0 border-0 border-end border-secondary text-white"
                   href="">
                    <i class="fab fa-linkedin-in"></i>
                </a>

                <a class="btn btn-square btn-link rounded-0 text-white"
                   href="https://www.instagram.com/renew1_sol/"
                   target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </div>
</div>
<!-- Topbar End -->

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top p-0 shadow-sm">
    <div class="container-fluid px-4 px-lg-5">

        <a href="{% url 'index' %}" class="navbar-brand d-flex align-items-center">
            <img src="{% static 'img/logo.png' %}" alt="RenewOne Logo" class="navbar-logo">
        </a>

        <button type="button"
                class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">

            <div class="navbar-nav ms-auto py-0">

                <a href="{% url 'about' %}" class="nav-item nav-link">

                </a>

                <a href="{% url 'services' %}" class="nav-item nav-link">
                    Services
                </a>

                <a href="{% url 'projects' %}" class="nav-item nav-link">
                    Projects
                </a>

                <a href="{% url 'blog' %}" class="nav-item nav-link">
                    Blog
                </a>

                <a href="{% url 'feature' %}" class="nav-item nav-link">
                    WHY RENEWONE
                </a>

                <a href="{% url 'contact' %}" class="nav-item nav-link">
                    Contact
                </a>

            </div>

            <a href="{% url 'quote' %}"
               class="btn btn-primary rounded-pill py-2 px-4 ms-lg-4 d-none d-lg-block">
                Get Quote

    </div>
</nav>
